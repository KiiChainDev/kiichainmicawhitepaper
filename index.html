<html xmlns="http://www.w3.org/1999/xhtml" xmlns:xbrli="http://www.xbrl.org/2003/instance" xmlns:iso4217="http://www.xbrl.org/2003/iso4217" xmlns:xbrldi="http://xbrl.org/2006/xbrldi" xmlns:link="http://www.xbrl.org/2003/linkbase" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:ix="http://www.xbrl.org/2013/inlineXBRL" xmlns:mica="https://www.esma.europa.eu/taxonomy/2025-03-31/mica/" xmlns:ixt4="http://www.xbrl.org/inlineXBRL/transformation/2020-02-12" xmlns:utr="http://www.xbrl.org/2009/utr">

<head>
  <title>
    KiiChain MiCAR White Paper
  </title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8"/>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&amp;display=swap" rel="stylesheet"/>

  <style type="text/css">
    :root {
      --primary-blue: #000000;
      --border-gray: #e5e7eb;
      --text-dark: #111827;
      --text-muted: #6b7280;
      --text-label: #9ca3af;
      --bg-white: #ffffff;
      --bg-section: #f3f4f6;
      --bg-canvas: #f9fafb;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-canvas);
      color: var(--text-dark);
      font-family: 'Lato', Arial, sans-serif;
      font-size: 11pt;
      line-height: 1.5;
      padding: 24pt 0;
    }

    /* Page container - each section looks like a page */
    .page {
      background-color: var(--bg-white);
      max-width: 700pt;
      margin: 16pt auto;
      padding: 48pt;
      border: 1px solid var(--border-gray);
      border-radius: 4px;
      position: relative;
      min-height: 800pt;
      display: flex;
      flex-direction: column;
      box-shadow: none;
    }

    /* Page header */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 8pt;
      margin-bottom: 12pt;
      border-bottom: 1px solid var(--border-gray);
    }

    .page-header-left {
      display: flex;
      align-items: center;
      gap: 8pt;
      font-size: 12pt;
      font-weight: 700;
      color: var(--primary-blue);
    }

    .page-header-left .header-logo {
      width: auto;
      max-width: 200pt;
      height: 40pt;
      object-fit: contain;
    }

    .page-header-right {
      font-size: 10pt;
      color: var(--text-muted);
    }

    /* Page content */
    .page-content {
      flex: 1;
    }

    /* Page footer */
    .page-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16pt;
      border-top: 1px solid var(--border-gray);
      margin-top: 24pt;
      font-size: 9pt;
      color: var(--text-muted);
    }

    .page-footer-left {
      font-size: 9pt;
    }

    .page-footer-right {
      font-size: 9pt;
    }

    h1,
    h2,
    h3 {
      font-family: 'Lato', Arial, sans-serif;
      color: var(--text-dark);
      font-weight: 700;
    }

    h1 {
      font-size: 24pt;
      line-height: 1.3;
      margin-bottom: 12pt;
    }

    h2 {
      font-size: 18pt;
      line-height: 1.2;
      margin-top: 24pt;
      margin-bottom: 12pt;
      page-break-after: avoid;
    }

    /* Cover Page Styles - clean regulatory style */
    .cover-page {
      display: flex;
      flex-direction: column;
      min-height: 800pt;
      position: relative;
      background-color: var(--bg-white);
      max-width: 700pt;
      margin: 16pt auto;
      padding: 48pt;
      border: 1px solid var(--border-gray);
      border-radius: 4px;
      box-shadow: none;
    }

    .cover-header {
      margin-bottom: 60pt;
    }

    .cover-logo {
      max-width: 160pt;
      height: auto;
    }

    .cover-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding-top: 24pt;
    }

    .cover-label {
      font-size: 10pt;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 12pt;
      display: flex;
      align-items: center;
      gap: 6pt;
    }

    .cover-title {
      font-size: 32pt;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.2;
      margin-bottom: 24pt;
      letter-spacing: -0.02em;
    }

    .cover-description {
      font-size: 12pt;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 400pt;
      margin-bottom: 48pt;
    }

    .cover-meta {
      margin-top: auto;
      border-top: 1px solid var(--border-gray);
      padding-top: 24pt;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24pt;
    }

    .cover-meta-item {
      display: flex;
      flex-direction: column;
      gap: 4pt;
    }

    .cover-meta-label {
      font-size: 8pt;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5pt;
    }

    .cover-meta-value {
      font-size: 10pt;
      color: var(--text-dark);
      font-weight: 500;
    }

    .cover-warning {
      margin-top: 32pt;
      padding: 16pt;
      background-color: #fef2f2;
      border: 1px solid #fee2e2;
      border-radius: 6px;
    }

    .cover-warning-title {
      font-size: 10pt;
      font-weight: 700;
      color: #991b1b;
      margin-bottom: 4pt;
      text-transform: uppercase;
    }

    .cover-warning-text {
      font-size: 10pt;
      color: #7f1d1d;
      line-height: 1.5;
    }

    /* Divider */
    hr,
    .divider {
      border: none;
      height: 1px;
      background-color: var(--border-gray);
      margin: 24pt 0;
    }

    /* Table of Contents */
    .toc {
      margin-bottom: 24pt;
    }

    .toc-table {
      width: 100%;
      border-collapse: collapse;
      border: none;
    }

    .toc-table td {
      padding: 8pt 0;
      border: none;
      border-bottom: 1px solid var(--bg-section);
      font-size: 11.5pt;
      color: var(--text-dark);
      vertical-align: top;
    }

    .toc-table td a {
      color: var(--text-dark);
      text-decoration: none;
    }

    .toc-table td a:hover {
      color: var(--primary-blue);
      text-decoration: underline;
    }

    .toc-table .toc-page {
      text-align: right;
      width: 80pt;
      color: var(--text-muted);
      font-size: 10.5pt;
    }

    /* Main Data Tables */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24pt;
      font-size: 11pt;
    }

    .data-table thead th {
      background-color: var(--primary-blue);
      color: var(--bg-white);
      font-weight: 700;
      padding: 8pt;
      text-align: left;
      border: 1px solid var(--primary-blue);
    }

    .data-table thead th:first-child {
      width: 50pt;
    }

    .data-table thead th:nth-child(2) {
      width: 160pt;
    }

    .data-table tbody td {
      padding: 8pt;
      border: 1px solid var(--border-gray);
      vertical-align: top;
      background-color: var(--bg-white);
    }

    .data-table tbody tr.section-header td {
      background-color: var(--bg-white);
      font-weight: 700;
      border-left-width: 0;
      border-right-width: 0;
    }

    .data-table tbody tr.subsection-header td {
      background-color: var(--bg-white);
      font-weight: 700;
      color: #434343;
      font-size: 10pt;
    }

    .data-table tbody td.field-number {
      font-weight: 400;
    }

    .data-table tbody td.field-label {
      font-weight: 400;
    }

    .data-table tbody td.field-label.bold {
      font-weight: 700;
    }

    .data-table tbody td.field-content {
      font-weight: 400;
    }

    /* Compliance Cards */
    .compliance-card {
      padding: 12pt;
      background-color: #fafafa;
      margin: 8pt 0;
    }

    .warning-notice {
      padding: 12pt;
      background-color: #fafafa;
      border-left: 4px solid var(--primary-blue);
      margin: 8pt 0;
    }

    /* Hidden XBRL elements */
    .xbrl-hidden {
      display: none;
    }

    /* Print styles */
    @media print {
      body {
        padding: 0;
      }

      .data-table {
        page-break-inside: avoid;
      }

      h2 {
        page-break-after: avoid;
      }

      .cover-page {
        page-break-after: always;
      }

      /* Each major section starts on a new page */
      .section-page {
        page-break-before: always;
      }
    }

    /* Item entry styling for inline content */
    .item-entry {
      display: grid;
      grid-template-columns: 50pt 160pt 1fr;
      gap: 0;
      border: 1px solid var(--border-gray);
      border-top: none;
      background-color: var(--bg-white);
    }

    .item-entry:first-child {
      border-top: 1px solid var(--border-gray);
    }

    .item-no {
      grid-column: 1;
      padding: 8pt;
      border-right: 1px solid var(--border-gray);
      font-weight: 400;
      color: var(--text-dark);
    }

    .item-field {
      grid-column: 2;
      padding: 8pt;
      border-right: 1px solid var(--border-gray);
      font-weight: 400;
      color: var(--text-dark);
    }

    .item-content {
      grid-column: 3;
      padding: 8pt;
      font-weight: 400;
      color: var(--text-dark);
    }

    /* Rich text content styling */
    .item-content ul,
    .item-content ol {
      margin: 4pt 0;
      padding-left: 16pt;
    }

    .item-content li {
      margin: 2pt 0;
      padding-left: 4pt;
    }

    .item-content p {
      margin: 4pt 0;
    }

    .item-content p:first-child {
      margin-top: 0;
    }

    .item-content p:last-child {
      margin-bottom: 0;
    }

    .data-table td.field-content ul,
    .data-table td.field-content ol {
      margin: 4pt 0;
      padding-left: 16pt;
    }

    .data-table td.field-content li {
      margin: 2pt 0;
      padding-left: 4pt;
    }

    .data-table td.field-content p {
      margin: 4pt 0;
    }

    .data-table td.field-content p:first-child {
      margin-top: 0;
    }

    .data-table td.field-content p:last-child {
      margin-bottom: 0;
    }

    /* Nested tables inside content cells (energy mix, milestones, etc.) */
    .item-content table,
    .data-table td.field-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 4pt 0;
      font-size: 9pt;
      background-color: var(--bg-white);
    }

    .item-content table thead th,
    .data-table td.field-content table thead th {
      background-color: #f5f5f5;
      padding: 6pt 8pt;
      text-align: left;
      font-weight: 600;
      border: 1px solid var(--border-gray);
      color: var(--text-dark);
    }

    .item-content table tbody td,
    .data-table td.field-content table tbody td {
      padding: 6pt 8pt;
      border: 1px solid var(--border-gray);
      vertical-align: top;
    }

    .item-content table tbody tr:nth-child(even),
    .data-table td.field-content table tbody tr:nth-child(even) {
      background-color: #fafafa;
    }

    .item-content table tbody tr:hover,
    .data-table td.field-content table tbody tr:hover {
      background-color: #f0f4f8;
    }

    /* Bold total row styling */
    .item-content table tbody tr[style*='font-weight: bold'],
    .data-table td.field-content table tbody tr[style*='font-weight: bold'] {
      background-color: #f5f5f5;
      border-top: 2px solid var(--border-gray);
    }

    /* Energy mix table specific styling */
    .energy-mix-table,
    table.energy-mix-table {
      width: 100%;
      border-collapse: collapse;
    }

    /* Section Table Layout */
    .section-table {
      margin-bottom: 24pt;
      font-size: 11pt;
    }

    .section-table .table-header {
      display: grid;
      grid-template-columns: 50pt 160pt 1fr;
      background-color: var(--primary-blue);
      color: var(--bg-white);
      font-weight: 700;
    }

    .section-table .table-header span {
      padding: 8pt;
      border: 1px solid var(--primary-blue);
    }

    .section-table .table-body {
      display: block;
    }

    .section-table .table-body .item-entry {
      display: grid;
      grid-template-columns: 50pt 160pt 1fr;
      border: 1px solid var(--border-gray);
      border-top: none;
    }

    /* Footer */
    .footer {
      margin-top: 48pt;
      padding-top: 12pt;
      border-top: 1px solid var(--border-gray);
      font-size: 8.5pt;
      color: var(--text-muted);
    }
  </style>

  
</head>
